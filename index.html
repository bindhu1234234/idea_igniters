<!DOCTYPE html>
<html>
<head>
    <title>Plant Disease Detection</title>
    <style>
        body {
            font-family: Arial;
            background-color: #eef7ee;
            text-align: center;
        }

        .container {
            width: 420px;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
            margin-top: 40px;
        }

        h1 { color: green; }

        button {
            background: green;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        img {
            margin-top: 10px;
            width: 200px;
            height: 200px;
            display: none;
            border: 2px solid green;
        }

        .result-box {
            margin-top: 20px;
            padding: 10px;
            background: #f4fff4;
            border-radius: 8px;
        }

        .sample-img {
            width: 150px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🌿 Plant Disease Detection</h1>

    <input type="file" id="imageInput" accept="image/*"><br><br>
    <button onclick="detectDisease()">Detect</button>

    <br>
    <img id="preview">

    <div id="result" class="result-box"></div>
</div>

<script>
const preview = document.getElementById("preview");
const result = document.getElementById("result");

imageInput.onchange = () => {
    const file = imageInput.files[0];
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
};

function detectDisease() {
    const file = imageInput.files[0];

    if (!file) {
        result.innerHTML = "⚠ Upload image first!";
        return;
    }

    result.innerHTML = "⏳ Processing...";

    const formData = new FormData();
    formData.append("file", file);

    fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        result.innerHTML = `
            <h3>✅ Disease: ${data.name}</h3>
            <p><b>Description:</b> ${data.desc}</p>
            <img class="sample-img" src="${data.image}">
        `;
    })
    .catch(() => {
        result.innerHTML = "❌ Server error";
    });
}
</script>

</body>
</html>
