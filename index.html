<!DOCTYPE html>
<html>
<head>
    <title>Plant Disease Detection</title>

    <!-- TensorFlow + Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>

    <style>
        body {
            font-family: Arial;
            background-color: #f0f8f0;
            text-align: center;
        }

        .container {
            width: 400px;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
            margin-top: 50px;
        }

        h1 { color: green; }

        button {
            background-color: green;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
            color: darkblue;
        }

        img {
            margin-top: 15px;
            width: 200px;
            height: 200px;
            display: none;
            border: 2px solid green;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🌿 Plant Disease Detection</h1>

    <input type="file" id="imageInput" accept="image/*"><br><br>
    <button onclick="predict()">Detect Disease</button>

    <div>
        <img id="preview">
    </div>

    <div id="result">Result will appear here...</div>
</div>

<script>
let model;

// 🔹 Load your trained model
async function loadModel() {
    const URL = "model/";  // folder in GitHub
    model = await tmImage.load(URL + "model.json", URL + "metadata.json");
}
loadModel();

// 🔹 Show preview
const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");

imageInput.onchange = function() {
    const file = imageInput.files[0];
    if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
    }
};

// 🔹 Predict disease
async function predict() {
    if (!model) {
        document.getElementById("result").innerHTML = "⏳ Model loading...";
        return;
    }

    if (!preview.src) {
        document.getElementById("result").innerHTML = "⚠️ Upload an image!";
        return;
    }

    const prediction = await model.predict(preview);

    let highest = prediction[0];

    for (let i = 1; i < prediction.length; i++) {
        if (prediction[i].probability > highest.probability) {
            highest = prediction[i];
        }
    }

    document.getElementById("result").innerHTML =
        "🌱 Detected Disease: " + highest.className +
        "<br>📊 Accuracy: " + (highest.probability * 100).toFixed(2) + "%";
}
</script>

</body>
</html>
